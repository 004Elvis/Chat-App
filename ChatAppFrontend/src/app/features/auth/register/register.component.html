<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>💬 ChatApp</h1>
      <p>Create your account to get started.</p>
    </div>

    @if (error()) {
      <div class="auth-error">{{ error() }}</div>
    }

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input
          class="form-input"
          [class.input-error]="usernameError()"
          [class.input-success]="isUsernameValid && userName"
          type="text"
          placeholder="letters, numbers, _ or - only"
          [(ngModel)]="userName"
          name="userName"
          (input)="validateUsername()"
          required
        />
        @if (usernameError()) {
          <span class="form-error">{{ usernameError() }}</span>
        }
        @if (isUsernameValid && userName) {
          <span class="form-success">✓ Username looks good</span>
        }
        <span class="form-hint">
          3–20 characters. Letters, numbers, _ and - only. No spaces.
        </span>
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input
          class="form-input"
          type="email"
          placeholder="Enter your email"
          [(ngModel)]="email"
          name="email"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input
          class="form-input"
          type="password"
          placeholder="At least 6 characters"
          [(ngModel)]="password"
          name="password"
          required
        />
      </div>

      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="loading() || !isUsernameValid">
        @if (loading()) {
          <span class="spinner"></span>
        } @else {
          Create Account
        }
      </button>
    </form>

    <div class="auth-footer">
      Already have an account?
      <a routerLink="/login">Sign in</a>
    </div>
  </div>
</div>
